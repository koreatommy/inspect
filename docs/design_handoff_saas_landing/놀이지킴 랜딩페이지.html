<style>
  :root {
    --page-bg: #FBFCFE;
    --page-fg: dark;
  }
  html, body {
    background: var(--page-bg);
    transition: background 700ms cubic-bezier(.2,.7,.2,1);
  }
  body {
    font-family: var(--font-sans);
    color: var(--semantic-label-normal);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  a { color: inherit; }
  button { font-family: var(--font-sans); }

  /* Custom range input look — matches design system */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--semantic-line-solid-normal);
    border-radius: 999px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px; height: 24px;
    background: #fff;
    border: 2px solid var(--semantic-primary-normal);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0, 30, 80, .15);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px;
    background: #fff;
    border: 2px solid var(--semantic-primary-normal);
    border-radius: 50%;
    cursor: pointer;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 12px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(112,115,124,.20);
    border-radius: 99px;
    border: 3px solid var(--page-bg);
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(112,115,124,.35); }

  /* Disable transitions while reduced-motion mode */
  .no-scroll-fx [style*="transition"] { transition: none !important; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }

  /* Responsive tweaks */
  @media (max-width: 980px) {
    main > section > div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
    }
  }
</style>
</head>
